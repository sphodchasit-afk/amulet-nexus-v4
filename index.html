<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Amulet Debug v5</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --gold: #D4AF37; --dark: #1a1a1a; }
        body { background: var(--dark); color: white; font-family: sans-serif; padding: 20px; }
        .container { max-width: 500px; margin: 0 auto; border: 2px solid var(--gold); border-radius: 15px; padding: 20px; background: #222; }
        input { width: 100%; padding: 12px; margin: 10px 0; border-radius: 8px; border: 1px solid #444; background: #333; color: white; box-sizing: border-box; }
        .btn-p { width: 100%; padding: 15px; background: var(--gold); color: black; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; }
        #debug-console { background: #000; color: #0f0; padding: 10px; font-family: monospace; font-size: 11px; height: 100px; overflow-y: scroll; margin-bottom: 15px; border: 1px solid #444; border-radius: 5px; }
        .card { background: #333; border-radius: 10px; padding: 15px; margin-top: 15px; border-left: 5px solid var(--gold); }
    </style>
</head>
<body>

<div class="container">
    <h2 style="color:var(--gold);">🔎 โหมดตรวจจับ Error</h2>
    
    <div id="debug-console">ระบบพร้อมตรวจสอบ...</div>

    <input type="text" id="name" placeholder="ชื่อพระเครื่อง">
    <input type="file" id="imageInput" accept="image/*">
    <button class="btn-p" id="saveBtn" onclick="saveData()">🚀 ทดสอบบันทึก</button>

    <div style="margin-top: 30px;">
        <h3 style="color:var(--gold);">📁 รายการในพอร์ต</h3>
        <div id="list-container">กำลังตรวจสอบการเชื่อมต่อ...</div>
    </div>
</div>

<script>
    const SUPABASE_URL = 'https://skuorantmixlyhmqhrop.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InNrdW9yYW50bWl4bHlobXFocm9wIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM1Mzc0NDgsImV4cCI6MjA4OTExMzQ0OH0.iIThjcmSSDdag0SQ48IZCAvwSJpVBhCjYxKcTSZipKE';
    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    const consoleLog = (msg) => {
        const el = document.getElementById('debug-console');
        el.innerHTML += `<div>> ${msg}</div>`;
        el.scrollTop = el.scrollHeight;
    };

    async function fetchAmulets() {
        consoleLog("กำลังดึงข้อมูลจากตาราง...");
        try {
            const { data, error } = await supabase.from('amulets').select('*');
            if (error) {
                consoleLog("❌ ดึงข้อมูลล้มเหลว: " + error.message);
                document.getElementById('list-container').innerText = "เชื่อมต่อพัง: " + error.message;
            } else {
                consoleLog("✅ ดึงข้อมูลสำเร็จ! พบ " + data.length + " รายการ");
                document.getElementById('list-container').innerHTML = data.length === 0 ? "ตารางว่างเปล่า" : data.map(i => `<div class="card">${i.name}</div>`).join('');
            }
        } catch (e) {
            consoleLog("❌ Error รุนแรง: " + e.message);
        }
    }

    async function saveData() {
        const name = document.getElementById('name').value;
        const file = document.getElementById('imageInput').files[0];
        
        if (!name) { alert("ใส่ชื่อพระด้วยครับ"); return; }

        consoleLog("--- เริ่มกระบวนการบันทึก ---");
        consoleLog("1. ตรวจสอบข้อมูลชื่อ: " + name);
        
        let imageUrl = "";

        if (file) {
            consoleLog("2. ตรวจพบไฟล์รูป กำลังอัปโหลด...");
            try {
                const fileName = Date.now() + "_" + file.name;
                const { data, error } = await supabase.storage.from('amulet-images').upload(fileName, file);
                
                if (error) {
                    consoleLog("⚠️ อัปโหลดรูปไม่สำเร็จ (ข้ามไป): " + error.message);
                } else {
                    imageUrl = supabase.storage.from('amulet-images').getPublicUrl(fileName).data.publicUrl;
                    consoleLog("✅ อัปโหลดรูปสำเร็จ URL: " + imageUrl);
                }
            } catch (e) { consoleLog("❌ บั๊กระบบรูป: " + e.message); }
        } else {
            consoleLog("2. ไม่มีไฟล์รูป ข้ามขั้นตอนอัปโหลด");
        }

        consoleLog("3. กำลังส่งข้อมูลลงตาราง amulets...");
        try {
            const { error } = await supabase.from('amulets').insert([{ name: name, image_url: imageUrl }]);
            if (error) {
                consoleLog("❌ บันทึกลงตารางไม่ได้!!: " + error.message);
                alert("บันทึกไม่ได้: " + error.message);
            } else {
                consoleLog("✅ บันทึกทุกอย่างสำเร็จ 100%!");
                alert("สำเร็จแล้ว!");
                location.reload();
            }
        } catch (e) {
            consoleLog("❌ บั๊กระบบตาราง: " + e.message);
        }
    }

    fetchAmulets();
</script>
</body>
</html>
