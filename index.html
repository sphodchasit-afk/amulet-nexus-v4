<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>Amulet Nexus v4 - Final</title>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <style>
        body { background: #1a1a1a; color: white; font-family: sans-serif; padding: 20px; text-align: center; }
        .box { max-width: 400px; margin: auto; border: 2px solid #D4AF37; padding: 20px; border-radius: 15px; background: #222; }
        input { width: 100%; padding: 10px; margin: 10px 0; border-radius: 5px; border: 1px solid #444; background: #333; color: white; }
        button { width: 100%; padding: 15px; background: #D4AF37; color: black; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; }
        .list { margin-top: 20px; text-align: left; }
        .item { background: #333; padding: 10px; margin-top: 10px; border-radius: 5px; border-left: 5px solid #D4AF37; }
    </style>
</head>
<body>

<div class="box">
    <h2 style="color:#D4AF37;">✋ Amulet Nexus v4</h2>
    <input type="text" id="name" placeholder="ชื่อพระเครื่อง">
    <input type="text" id="price" placeholder="ราคา">
    <button onclick="saveData()" id="btn">🚀 บันทึกข้อมูล</button>
    
    <div class="list" id="list">กำลังโหลดข้อมูล...</div>
</div>

<script>
    const URL = 'https://skuorantmixlyhmqhrop.supabase.co';
    const KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InNrdW9yYW50bWl4bHlobXFocm9wIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM1Mzc0NDgsImV4cCI6MjA4OTExMzQ0OH0.iIThjcmSSDdag0SQ48IZCAvwSJpVBhCjYxKcTSZipKE';
    const supabase = window.supabase.createClient(URL, KEY);

    // 1. ดึงข้อมูล
    async function loadData() {
        const { data, error } = await supabase.from('amulets').select('*');
        if (error) {
            document.getElementById('list').innerHTML = "เชื่อมต่อไม่ได้: " + error.message;
        } else {
            document.getElementById('list').innerHTML = data.length === 0 ? "ไม่มีข้อมูล" : 
                data.map(i => `<div class="item"><b>${i.name}</b> - ${i.price} บาท</div>`).join('');
        }
    }

    // 2. บันทึกข้อมูล (เอาแบบง่ายที่สุด ตัดเรื่องรูปออกก่อน)
    async function saveData() {
        const name = document.getElementById('name').value;
        const price = document.getElementById('price').value;
        if (!name) return alert("กรุณาใส่ชื่อ");

        document.getElementById('btn').innerText = "กำลังบันทึก...";
        
        const { error } = await supabase.from('amulets').insert([{ name, price }]);

        if (error) {
            alert("บันทึกไม่สำเร็จ: " + error.message);
        } else {
            alert("บันทึกสำเร็จแล้ว!");
            location.reload();
        }
    }

    loadData();
</script>
</body>
</html>
