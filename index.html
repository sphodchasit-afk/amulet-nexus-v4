<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Amulet Nexus v4 Debug</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --gold: #D4AF37; --dark: #1a1a1a; }
        body { background: var(--dark); color: white; font-family: sans-serif; padding: 20px; }
        .container { max-width: 600px; margin: 0 auto; border: 2px solid var(--gold); border-radius: 15px; padding: 20px; background: #222; }
        .btn-p { width: 100%; padding: 15px; background: var(--gold); color: black; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; }
        .card { background: #333; border-radius: 10px; padding: 15px; margin-top: 15px; border-left: 5px solid var(--gold); }
        #debug-log { background: #000; color: #0f0; padding: 10px; font-family: monospace; font-size: 12px; margin-top: 10px; border-radius: 5px; border: 1px solid #444; }
    </style>
</head>
<body>

<div class="container">
    <h1>✋ Amulet Nexus v4</h1>
    <div id="debug-log">🔎 ระบบตรวจสอบ: เริ่มต้นการทำงาน...</div>
    
    <div style="margin-top:20px;">
        <input type="text" id="name" placeholder="ชื่อพระเครื่อง" style="width:100%; padding:10px; margin-bottom:10px;">
        <input type="file" id="imageInput" accept="image/*" style="margin-bottom:10px;">
        <button class="btn-p" id="saveBtn" onclick="saveData()">🚀 บันทึกข้อมูล</button>
    </div>

    <h3>📁 รายการในพอร์ต</h3>
    <div id="list-container">กำลังตรวจสอบการเชื่อมต่อ...</div>
</div>

<script>
    const SUPABASE_URL = 'https://skuorantmixlyhmqhrop.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InNrdW9yYW50bWl4bHlobXFocm9wIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM1Mzc0NDgsImV4cCI6MjA4OTExMzQ0OH0.iIThjcmSSDdag0SQ48IZCAvwSJpVBhCjYxKcTSZipKE';
    
    const log = (msg) => { document.getElementById('debug-log').innerText += "\n> " + msg; };

    try {
        var supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        log("1. สร้าง Client สำเร็จ");
    } catch (e) {
        log("❌ สร้าง Client พลาด: " + e.message);
    }

    async function fetchAmulets() {
        log("2. กำลังพยายามดึงข้อมูลจากตาราง amulets...");
        const { data, error } = await supabase.from('amulets').select('*');
        
        if (error) {
            log("❌ ดึงข้อมูลพลาด: " + error.message + " (Code: " + error.code + ")");
            document.getElementById('list-container').innerHTML = "<span style='color:red;'>เชื่อมต่อไม่สำเร็จ: " + error.message + "</span>";
            return;
        }

        log("✅ เชื่อมต่อสำเร็จ! พบข้อมูล " + data.length + " รายการ");
        const container = document.getElementById('list-container');
        if (data.length === 0) {
            container.innerHTML = "เชื่อมต่อสำเร็จ แต่ยังไม่มีข้อมูลในตาราง";
        } else {
            container.innerHTML = data.map(item => `<div class='card'>${item.name}</div>`).join('');
        }
    }

    async function saveData() {
        log("3. กำลังเริ่มการบันทึก...");
        // ส่วนของการเซฟจะแจ้ง error ละเอียดในหน้าจอหลังกดครับ
    }

    fetchAmulets();
</script>

</body>
</html>
